name: Deploy to Pages Branch

on:
  # 每次推送到 `master` 分支时触发这个"工作流程"
  # 如果你使用了别的分支名，请按需将 `master` 替换成你的分支名
  push:
    branches: [ master ]
  # 允许你在 GitHub 上的 Actions 标签中手动触发此"工作流程"
  workflow_dispatch:

# 需要写入权限来推送到pages分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: Build site
        run: pnpm run build

      - name: Create .nojekyll file
        run: touch dist/.nojekyll

      - name: Upload dist to ECS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          source: "dist/*"
          target: /opt/1panel/apps/openresty/openresty/www/sites/z42.site/index
          strip_components: 1
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_PORT }}
          script: |
            chown -R 1000:1000 /opt/1panel/apps/openresty/openresty/www/sites/z42.site/index
            find /opt/1panel/apps/openresty/openresty/www/sites/z42.site/index -type d -exec chmod 775 {} \;
            find /opt/1panel/apps/openresty/openresty/www/sites/z42.site/index -type f -exec chmod 664 {} \;
      
